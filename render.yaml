services:


  # FastAPI Backend
  - type: web
    name: reliable-agent-backend
    env: python
    plan: free
    region: ohio
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      # Securely sync existing Redis instance URL
      - key: REDIS_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MAX_CONCURRENT_STEPS
        value: "5"
      - key: STEP_TIMEOUT
        value: "60"
      - key: MAX_STEPS
        value: "15"
      - key: GRAPH_RECURSION_LIMIT
        value: "0"
      - key: CHAOS_MODE
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: OPEN_SOURCE_BASE_URL
        value: "https://router.huggingface.co/v1"
      - key: PRIMARY_MODEL
        value: "meta-llama/llama-3.1-8b-instruct:free"
      - key: FALLBACK_MODEL
        value: "qwen/qwen-2.5-7b-instruct:free"
      - key: VALIDATION_MODEL
        value: "qwen/qwen-2.5-7b-instruct:free"
      # Securely sync API keys in the Render Dashboard
      - key: OPEN_SOURCE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

  # React Frontend
  - type: web
    name: reliable-agent-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:

      # The backend's public URL (e.g. https://reliable-agent-backend-emlv.onrender.com)
      - key: VITE_API_URL
        sync: false
